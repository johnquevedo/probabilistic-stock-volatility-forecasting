data:
  period: "10y"
  interval: "1d"
  cache_dir: "data/cache"
  rv_window: 5
  max_lag: 10
  volume_z_window: 20
model:
  train_window: 750
  horizon: 5
  epochs: 125
  lr: 0.08
  early_stopping_patience: 12
  min_improvement: 1.0e-4
  use_periodic_kernel: true
  device: "auto"
eval:
  backtest_years: 2
  coverage_levels: [0.5, 0.9, 0.95]
  ewma_decay: 0.94
artifacts:
  dir: "artifacts"
  predictions_file: "results.parquet"
  metrics_file: "metrics_summary.json"
  future_file: "future_forecasts.parquet"
